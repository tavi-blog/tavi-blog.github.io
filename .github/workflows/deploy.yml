name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

env:
  ASTRO_TELEMETRY_DISABLED: 1

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout your repository using git
        uses: actions/checkout@v4
      - name: Install, build, and upload your site
        uses: withastro/action@v3
        with:
          node-version: 22

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  newsletter:
    needs: deploy
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Send newsletter for new posts
        env:
          BUTTONDOWN_API_KEY: ${{ secrets.BUTTONDOWN_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, re, glob, sys, urllib.request, urllib.error, yaml
          from datetime import datetime

          SENT_FILE = "newsletter-sent.json"
          POSTS_DIR = "src/content/blog"
          API_URL = "https://api.buttondown.com/v1/emails"
          BASE_URL = "https://tavi-blog.github.io"
          API_KEY = os.environ["BUTTONDOWN_API_KEY"]

          sent = {}
          if os.path.exists(SENT_FILE):
              with open(SENT_FILE) as f:
                  sent = json.load(f)

          posts = sorted(glob.glob(f"{POSTS_DIR}/*.md"))
          failed = False

          for post_path in posts:
              slug = os.path.basename(post_path)[:-3]
              if slug == ".gitkeep" or slug in sent:
                  continue

              with open(post_path) as f:
                  raw = f.read()

              fm_match = re.match(r'^---\n(.*?)\n---\n', raw, re.DOTALL)
              if not fm_match:
                  print(f"Warning: skipping {slug} — no frontmatter found")
                  continue

              fm_data = yaml.safe_load(fm_match.group(1))
              body = raw[fm_match.end():].strip()

              full_title = fm_data.get('title', '')
              if not full_title:
                  print(f"Warning: skipping {slug} — no title in frontmatter")
                  continue

              subject = re.sub(r'^[^a-zA-Z0-9]+', '', full_title).strip()
              pub_date = fm_data.get('pubDate', '')
              raw_date = str(pub_date)[:10] if pub_date else ""

              try:
                  formatted_date = datetime.strptime(raw_date, "%Y-%m-%d").strftime("%B %-d, %Y")
              except ValueError:
                  formatted_date = raw_date

              canonical = f"{BASE_URL}/{slug}/"
              email_body = f"{full_title}\n{formatted_date} · {canonical}\n\n{body}"

              payload = json.dumps({
                  "subject": subject,
                  "body": email_body,
                  "status": "about_to_send",
              }).encode()

              req = urllib.request.Request(
                  API_URL,
                  data=payload,
                  headers={
                      "Authorization": f"Token {API_KEY}",
                      "Content-Type": "application/json",
                      "X-Buttondown-Live-Dangerously": "true",
                  },
                  method="POST",
              )

              try:
                  with urllib.request.urlopen(req) as resp:
                      result = json.loads(resp.read())
                      email_id = result["id"]
                  sent[slug] = {
                      "buttondown_id": email_id,
                      "subject": subject,
                      "sent_at": raw_date,
                  }
                  # Write after each successful send so a mid-run failure
                  # doesn't lose already-sent entries and cause duplicate sends.
                  with open(SENT_FILE, "w") as f:
                      json.dump(sent, f, indent=2)
                  print(f"Sent: {subject} ({email_id})")
              except urllib.error.HTTPError as e:
                  err = e.read().decode()
                  try:
                      err_code = json.loads(err).get("code", "")
                  except json.JSONDecodeError:
                      err_code = ""
                  if err_code == "email_duplicate":
                      # Already sent outside the workflow; log it and move on.
                      print(f"Note: '{slug}' already exists in Buttondown. Marking as sent.")
                      sent[slug] = {"buttondown_id": None, "subject": subject, "sent_at": raw_date, "note": "duplicate_detected"}
                      with open(SENT_FILE, "w") as f:
                          json.dump(sent, f, indent=2)
                  else:
                      print(f"ERROR: Buttondown returned {e.code} for '{slug}': {err}", file=sys.stderr)
                      failed = True

          if failed:
              # Exit non-zero to surface the error in the Actions UI.
              # The deploy job already completed — this does not roll it back.
              sys.exit(1)
          PYEOF

      - name: Commit updated sent log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git diff --quiet newsletter-sent.json; then
            echo "No new emails sent."
            exit 0
          fi
          git stash
          git pull --rebase origin main
          git stash pop
          git add newsletter-sent.json
          git commit -m "chore: update newsletter sent log [skip ci]"
          git push origin main

  tweet:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: pip install tweepy anthropic --quiet

      - name: Tweet new posts
        env:
          TWITTER_API_KEY: ${{ secrets.TWITTER_API_KEY }}
          TWITTER_API_SECRET: ${{ secrets.TWITTER_API_SECRET }}
          TWITTER_ACCESS_TOKEN: ${{ secrets.TWITTER_ACCESS_TOKEN }}
          TWITTER_ACCESS_TOKEN_SECRET: ${{ secrets.TWITTER_ACCESS_TOKEN_SECRET }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          python3 << 'PYEOF'
          import os, json, glob, re, sys, yaml
          import tweepy, anthropic

          SENT_FILE = "newsletter-sent.json"
          TWEETED_FILE = "twitter-sent.json"
          POSTS_DIR = "src/content/blog"
          BASE_URL = "https://tavi-blog.github.io"

          client = tweepy.Client(
              consumer_key=os.environ["TWITTER_API_KEY"],
              consumer_secret=os.environ["TWITTER_API_SECRET"],
              access_token=os.environ["TWITTER_ACCESS_TOKEN"],
              access_token_secret=os.environ["TWITTER_ACCESS_TOKEN_SECRET"],
          )

          tweeted = {}
          if os.path.exists(TWEETED_FILE):
              with open(TWEETED_FILE) as f:
                  tweeted = json.load(f)

          posts = sorted(glob.glob(f"{POSTS_DIR}/*.md"))
          failed = False

          for post_path in posts:
              slug = os.path.basename(post_path)[:-3]
              if slug == ".gitkeep" or slug in tweeted:
                  continue

              with open(post_path) as f:
                  raw = f.read()

              fm_match = re.match(r'^---\n(.*?)\n---\n', raw, re.DOTALL)
              if not fm_match:
                  continue

              fm_data = yaml.safe_load(fm_match.group(1))
              title = fm_data.get('title', '')
              if not title:
                  continue

              canonical = f"{BASE_URL}/{slug}/"
              body = raw[fm_match.end():].strip()

              hook = None
              api_key = os.environ.get("ANTHROPIC_API_KEY", "")
              if api_key and body:
                  try:
                      ac = anthropic.Anthropic(api_key=api_key)
                      msg = ac.messages.create(
                          model="claude-haiku-4-5-20251001",
                          max_tokens=80,
                          messages=[{
                              "role": "user",
                              "content": (
                                  "Write a single punchy tweet hook (no hashtags, no quotes, no emoji) "
                                  "that makes someone want to click and read this post. "
                                  "Under 120 characters. Output only the hook, nothing else.\n\n"
                                  f"{body[:3000]}"
                              ),
                          }],
                      )
                      hook = msg.content[0].text.strip()
                  except Exception as e:
                      print(f"Warning: Claude hook generation failed for '{slug}': {e}", file=sys.stderr)

              if not hook:
                  hook = fm_data.get('description', '').strip()

              if hook:
                  max_hook = 280 - len(title) - len(canonical) - 4
                  if len(hook) > max_hook:
                      hook = hook[:max_hook - 1].rstrip() + '…'
                  tweet_text = f"{title}\n\n{hook}\n\n{canonical}"
              else:
                  tweet_text = f"{title}\n\n{canonical}"

              try:
                  resp = client.create_tweet(text=tweet_text)
                  tweet_id = resp.data["id"]
                  tweeted[slug] = {"tweet_id": tweet_id, "title": title}
                  with open(TWEETED_FILE, "w") as f:
                      json.dump(tweeted, f, indent=2)
                  print(f"Tweeted: {title} ({tweet_id})")
              except Exception as e:
                  print(f"ERROR tweeting '{slug}': {e}", file=sys.stderr)
                  failed = True

          if failed:
              sys.exit(1)
          PYEOF

      - name: Commit twitter sent log
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if [ ! -f twitter-sent.json ] || git diff --quiet twitter-sent.json; then
            echo "No new tweets."
            exit 0
          fi
          git stash
          git pull --rebase origin main
          git stash pop
          git add twitter-sent.json
          git commit -m "chore: update twitter sent log [skip ci]"
          git push origin main
